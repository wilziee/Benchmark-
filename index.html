<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaerisoft benchmark</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="aurora-bg"></div>
    <div class="container">
        <header>
            <h1>Xaerisoft <span>Pro</span></h1>
            <p>Benchmark web</p>
        </header>

        <main id="app-content">
            <div class="device-info-card glass" id="device-info">
                <h3>Mengambil data perangkat...</h3>
            </div>

            <div class="benchmark-ui">
                <div class="progress-ring-container">
                    <svg class="progress-ring" width="200" height="200">
                        <circle class="progress-ring__circle" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent" r="90" cx="100" cy="100"/>
                        <circle class="progress-ring__circle progress-value" stroke="#00ffcc" stroke-width="8" fill="transparent" r="90" cx="100" cy="100"/>
                    </svg>
                    <div class="progress-text" id="status-text">Siap</div>
                </div>
                
                <button id="start-btn" class="neon-btn">JALANKAN BENCHMARK</button>
            </div>

            <div id="results" class="results-card glass hidden">
                <h2>Total Score</h2>
                <div class="total-score" id="final-score">0</div>
                <div class="rank-badge" id="rank-badge">Evaluating...</div>
                
                <div class="score-details">
                    <div class="score-item"><span>CPU</span> <strong id="score-cpu">0</strong></div>
                    <div class="score-item"><span>GPU</span> <strong id="score-gpu">0</strong></div>
                    <div class="score-item"><span>RAM</span> <strong id="score-ram">0</strong></div>
                    <div class="score-item"><span>Storage</span> <strong id="score-storage">0</strong></div>
                    <div class="score-item"><span>Browser</span> <strong id="score-browser">0</strong></div>
                    <div class="score-item"><span>AI (NPU Sim)</span> <strong id="score-ai">0</strong></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden Canvas for GPU Test -->
    <canvas id="gpu-canvas" style="display:none;"></canvas>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="device.js"></script>
    <script src="benchmark.js"></script>
    <script src="script.js"></script>
</body>
</html>
